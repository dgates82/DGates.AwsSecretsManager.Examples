services:
  localstack:
    image: localstack/localstack:3
    container_name: aws-sm-netframework-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=secretsmanager
      - DEBUG=0
    volumes:
      - "./docker/localstack-data:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./docker/seed-secrets.sh:/etc/localstack/init/ready.d/seed-secrets.sh"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10
